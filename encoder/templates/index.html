{% extends "base.html" %}
{% block title_suffix %} — Scan{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded shadow p-6" x-data="{ mode: 'film' }">
    <h1 class="text-2xl font-bold mb-4">Scan mappe</h1>

    <form method="post" action="{% url 'scan' %}">
        {% csrf_token %}

        <div class="mb-4">
            <label class="block font-medium mb-1">Kildemappe</label>
            <input type="text" name="source_path" value="{{ form.source_path.value|default_if_none:'' }}"
                   class="w-full p-2 border rounded" placeholder="/media/source" required>
            {% if form.source_path.errors %}
            <p class="text-red-500 text-sm mt-1">{{ form.source_path.errors.0 }}</p>
            {% endif %}
        </div>

        <div class="mb-4">
            <label class="block font-medium mb-1">Outputmappe</label>
            <input type="text" name="output_path" value="{{ form.output_path.value|default_if_none:'' }}"
                   class="w-full p-2 border rounded" placeholder="/media/output" required>
        </div>

        <div class="mb-4">
            <label class="block font-medium mb-1">Type</label>
            <div class="flex space-x-6">
                <label class="flex items-center space-x-2">
                    <input type="radio" name="mode" value="film" x-model="mode" checked>
                    <span>Film</span>
                </label>
                <label class="flex items-center space-x-2">
                    <input type="radio" name="mode" value="serie" x-model="mode">
                    <span>Serie</span>
                </label>
            </div>
        </div>

        <div class="mb-4">
            <label class="block font-medium mb-1">Encoding-profil</label>
            {{ form.profile }}
        </div>

        <button type="submit"
                class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 font-medium">
            Start scan
        </button>
    </form>
</div>
{% endblock %}
