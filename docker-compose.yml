version: "3.9"
services:
  web:
    image: ghcr.io/USERNAME/easyenc:latest
    ports:
      - "8000:8000"
    volumes:
      - data:/app/data
      - ${MEDIA_PATH_1:-/dev/null}:${MEDIA_PATH_1:-/dev/null}
      - ${MEDIA_PATH_2:-/dev/null}:${MEDIA_PATH_2:-/dev/null}
      - ${MEDIA_PATH_3:-/dev/null}:${MEDIA_PATH_3:-/dev/null}
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - REDIS_HOST=redis
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - ALLOWED_DIRS=${ALLOWED_DIRS}
    depends_on:
      - redis

  worker:
    image: ghcr.io/USERNAME/easyenc:latest
    command: /app/scripts/rqworker.sh
    volumes:
      - data:/app/data
      - ${MEDIA_PATH_1:-/dev/null}:${MEDIA_PATH_1:-/dev/null}
      - ${MEDIA_PATH_2:-/dev/null}:${MEDIA_PATH_2:-/dev/null}
      - ${MEDIA_PATH_3:-/dev/null}:${MEDIA_PATH_3:-/dev/null}
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - REDIS_HOST=redis
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - ALLOWED_DIRS=${ALLOWED_DIRS}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  data:
  redis_data:
