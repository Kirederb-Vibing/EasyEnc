version: "3.9"
services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ${MEDIA_SOURCE}:/media/source:ro
      - ${MEDIA_OUTPUT}:/media/output
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - MEDIA_SOURCE_PATH=/media/source
      - MEDIA_OUTPUT_PATH=/media/output
      - REDIS_HOST=redis
    depends_on:
      - redis

  worker:
    build: .
    command: ./scripts/rqworker.sh
    volumes:
      - ./data:/app/data
      - ${MEDIA_SOURCE}:/media/source:ro
      - ${MEDIA_OUTPUT}:/media/output
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - MEDIA_SOURCE_PATH=/media/source
      - MEDIA_OUTPUT_PATH=/media/output
      - REDIS_HOST=redis
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  redis_data:
